<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kehezen · clock</title>
<style>
:root {
  --bg:     #080808;
  --text:   #c0c0c0;
  --muted:  #3a3a3a;
  --accent: rgba(188, 148, 88, 0.85);
  --border: rgba(255,255,255,0.07);
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; min-height: 100%;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
}

.wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1.5rem;
  padding: 2.5rem 1.5rem;
}

canvas { display: block; flex-shrink: 0; }

button {
  height: 44px;
  padding: 0 1.5rem;
  background: transparent;
  border: 1px solid rgba(188,148,88,0.3);
  color: rgba(188,148,88,0.7);
  font-family: 'JetBrains Mono', 'Courier New', monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
  cursor: pointer;
  border-radius: 2px;
  transition: border-color 150ms ease-out, color 150ms ease-out;
  white-space: nowrap;
}
button:hover         { border-color: rgba(188,148,88,0.7); color: rgba(188,148,88,1); }
button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
button.active        { border-color: rgba(188,148,88,0.7); color: rgba(188,148,88,1); }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
</head>
<body>
<div class="wrapper">
  <canvas id="c"></canvas>
  <button id="toggle-btn">go</button>
</div>
<script>
'use strict';

// ── canvas setup ──────────────────────────────────────────────────────────────

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

const S  = Math.min(window.innerWidth, Math.floor(window.innerHeight * 0.65), 480);
canvas.width = canvas.height = S;

const CX = S / 2, CY = S / 2, R = S * 0.41;

// Shavian signs — outer ring, clear of all hand tips
const RUNES  = ['𐑐','𐑑','𐑒','𐑓','𐑔','𐑕','𐑖','𐑗','𐑘','𐑙','𐑚','𐑛'];
const RUNE_R = R * 0.875; // pushed out beyond hand reach

// Hand lengths
const L_H = R * 0.50;   // hour
const L_M = R * 0.715;  // minute
const L_S = R * 0.775;  // second  (max reach ≪ RUNE_R)

// ── physics constants ─────────────────────────────────────────────────────────

const GRAVITY  = 9;    // angular acceleration (floppy mode)
const DAMP_F   = 0.30; // light damping → nice pendulum swing
const SPRING_K = 20;   // spring stiffness (snap-back)
const DAMP_S   = 5;    // overdamped snap-back

// ── hand state ────────────────────────────────────────────────────────────────
// angle = radians from 12 o'clock, clockwise (0 = top, π = bottom)

const hands = [
  { angle: 0, vel: 0 }, // 0: hour
  { angle: 0, vel: 0 }, // 1: minute
  { angle: 0, vel: 0 }, // 2: second
];

let floppy   = false;
let lastPerf = performance.now();

function getTargets() {
  const d  = new Date();
  const ms = d.getMilliseconds();
  const s  = d.getSeconds() + ms / 1000;
  const m  = d.getMinutes() + s / 60;
  const h  = (d.getHours() % 12) + m / 60;
  return [h / 12, m / 60, s / 60].map(f => f * Math.PI * 2);
}

// Init angles to current time on load
(function () {
  const t = getTargets();
  hands.forEach((h, i) => { h.angle = t[i]; });
}());

// ── toggle ────────────────────────────────────────────────────────────────────

const toggleBtn = document.getElementById('toggle-btn');
toggleBtn.addEventListener('click', () => {
  floppy = !floppy;
  toggleBtn.textContent = floppy ? 'fix' : 'go';
  toggleBtn.classList.toggle('active', floppy);
});

// ── geometry ──────────────────────────────────────────────────────────────────

function handTip(angle, len) {
  return [CX + Math.sin(angle) * len, CY - Math.cos(angle) * len];
}

// ── elastic band ──────────────────────────────────────────────────────────────

function drawElastic(ax, ay, bx, by) {
  const dist    = Math.hypot(bx - ax, by - ay);
  const natural = R * 0.38;
  const slack   = Math.max(0, natural - dist);
  const sag     = Math.min(R * 0.32, 5 + slack * 1.25);
  const mx      = (ax + bx) / 2;
  const my      = (ay + by) / 2;

  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.92)';
  ctx.lineWidth   = 1.7;
  ctx.lineCap     = 'round';
  ctx.beginPath();

  if (dist < 4) {
    ctx.ellipse(ax, ay + sag * 0.65, 5, sag * 0.65, 0, 0, Math.PI * 2);
  } else {
    ctx.moveTo(ax, ay);
    ctx.quadraticCurveTo(mx, my + sag, bx, by);
  }

  ctx.stroke();
  ctx.restore();
}

// ── hand drawing ──────────────────────────────────────────────────────────────

function drawHand(angle, len, thick, color) {
  const sx = Math.sin(angle), cy = -Math.cos(angle);
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth   = thick;
  ctx.lineCap     = 'round';
  ctx.beginPath();
  ctx.moveTo(CX, CY);
  ctx.lineTo(CX + sx * len, CY + cy * len);
  ctx.stroke();
  ctx.restore();
}

// ── face ──────────────────────────────────────────────────────────────────────

function drawFace() {
  ctx.font         = `${Math.round(R * 0.118)}px 'Noto Sans Shavian', Georgia, serif`;
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  for (let i = 0; i < 12; i++) {
    const a = (i / 12) * Math.PI * 2;
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.fillText(RUNES[i], CX + Math.sin(a) * RUNE_R, CY - Math.cos(a) * RUNE_R);
  }
}

// ── main loop ─────────────────────────────────────────────────────────────────

function frame(perfNow) {
  const dt = Math.min(perfNow - lastPerf, 50) / 1000; // seconds, capped
  lastPerf = perfNow;

  const targets = getTargets();

  hands.forEach((hand, i) => {
    if (floppy) {
      // Pendulum under gravity — equilibrium at π (pointing straight down)
      const diff = hand.angle - Math.PI;
      const acc  = -GRAVITY * Math.sin(diff) - DAMP_F * hand.vel;
      hand.vel   += acc * dt;
      hand.angle += hand.vel * dt;
    } else {
      // Spring toward current time position, shortest angular path
      let diff = hand.angle - targets[i];
      while (diff >  Math.PI) diff -= Math.PI * 2;
      while (diff < -Math.PI) diff += Math.PI * 2;
      const acc  = -SPRING_K * diff - DAMP_S * hand.vel;
      hand.vel   += acc * dt;
      hand.angle += hand.vel * dt;
    }

    // Keep angle in [0, 2π] to prevent drift
    hand.angle = ((hand.angle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
  });

  // ── render ───────────────────────────────────────────────────────────────
  ctx.clearRect(0, 0, S, S);
  drawFace();

  const [hx, hy] = handTip(hands[0].angle, L_H);
  const [mx, my] = handTip(hands[1].angle, L_M);

  drawElastic(hx, hy, mx, my);

  drawHand(hands[2].angle, L_S, 1.7, 'rgba(255,255,255,0.92)');
  drawHand(hands[0].angle, L_H, 1.7, 'rgba(255,255,255,0.92)');
  drawHand(hands[1].angle, L_M, 1.7, 'rgba(255,255,255,0.92)');
  // no center dot

  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);
</script>
</body>
</html>
